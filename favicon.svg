<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fond carré arrondi violet -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#6366F1"/>

  <!-- Connexions satellites → centre -->
  <line x1="20" y1="20" x2="29" y2="29" stroke="white" stroke-width="2.5" opacity="0.8"/>
  <line x1="44" y1="20" x2="35" y2="29" stroke="white" stroke-width="2.5" opacity="0.8"/>
  <line x1="20" y1="44" x2="29" y2="35" stroke="white" stroke-width="2.5" opacity="0.8"/>
  <line x1="44" y1="44" x2="35" y2="35" stroke="white" stroke-width="2.5" opacity="0.8"/>

  <!-- Connexions horizontales satellites (trame périphérique) -->
  <line x1="20" y1="20" x2="44" y2="20" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <line x1="20" y1="44" x2="44" y2="44" stroke="white" stroke-width="1.2" opacity="0.3"/>

  <!-- Pointillé vers nœud fantôme bas -->
  <line x1="32" y1="41" x2="32" y2="52" stroke="white" stroke-width="1.5" opacity="0.3" stroke-dasharray="3 3"/>

  <!-- 4 nœuds satellites -->
  <circle cx="20" cy="20" r="5" fill="white" opacity="0.75"/>
  <circle cx="44" cy="20" r="5" fill="white" opacity="0.75"/>
  <circle cx="20" cy="44" r="5" fill="white" opacity="0.75"/>
  <circle cx="44" cy="44" r="5" fill="white" opacity="0.75"/>

  <!-- Nœud central -->
  <circle cx="32" cy="32" r="8" fill="white"/>

  <!-- Nœud fantôme -->
  <circle cx="32" cy="54" r="3" fill="white" opacity="0.3"/>
</svg>
